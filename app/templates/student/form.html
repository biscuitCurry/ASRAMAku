{% extends "app/base/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Outing Request Form</h3>
                </div>
                <div class="card-body">

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" id="outingForm">
                        {% csrf_token %}
                        
                        <!-- Student ID Lookup -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="matricId" class="form-label">Matric ID / Student ID:</label>
                                <input type="text" id="matricId" name="student_id" class="form-control" placeholder="Enter your matric ID" required>
                            </div>
                        </div>

                        <!-- Auto-fetched Student Info -->
                        <div id="studentInfo" style="display: none;">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Name:</label>
                                    <input type="text" id="studentName" class="form-control" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Course:</label>
                                    <input type="text" id="studentCourse" class="form-control" readonly>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Session:</label>
                                    <input type="text" id="studentSession" class="form-control" readonly>
                                </div>
                            </div>

                            <hr>

                            <!-- Destination -->
                            <div class="mb-3">
                                <label for="destination" class="form-label">Destination:</label>
                                <input type="text" name="destination" id="destination" class="form-control" placeholder="Where are you going?" required>
                            </div>

                            <!-- Reason -->
                            <div class="mb-3">
                                <label for="reason" class="form-label">Reason:</label>
                                <textarea name="reason" id="reason" class="form-control" rows="4" placeholder="Why do you need to go out?" required></textarea>
                            </div>

                            <!-- Date -->
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="outingDate" class="form-label">Date:</label>
                                    <input type="date" name="outing_date" id="outingDate" class="form-control" required>
                                </div>

                                <!-- Time -->
                                <div class="col-md-6">
                                    <label for="outingTime" class="form-label">Time:</label>
                                    <input type="time" name="outing_time" id="outingTime" class="form-control" required>
                                </div>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">Submit Request</button>
                                <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
                            </div>
                        </div>

                        <!-- Error Message -->
                        <div id="errorAlert" class="alert alert-danger alert-dismissible fade show" style="display: none;" role="alert">
                            <strong>Error:</strong> <span id="errorMessage"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('matricId').addEventListener('blur', function() {
    const matricId = this.value.trim();
    
    if (!matricId) {
        document.getElementById('studentInfo').style.display = 'none';
        return;
    }

    // Fetch student data via AJAX
    fetch(`/api/student/${matricId}/`)
        .then(response => {
            if (!response.ok) throw new Error('Student not found');
            return response.json();
        })
        .then(data => {
            document.getElementById('studentName').value = data.name;
            document.getElementById('studentCourse').value = data.course;
            document.getElementById('studentSession').value = data.session;
            document.getElementById('studentInfo').style.display = 'block';
            document.getElementById('errorAlert').style.display = 'none';
        })
        .catch(error => {
            document.getElementById('errorAlert').style.display = 'block';
            document.getElementById('errorMessage').textContent = error.message;
            document.getElementById('studentInfo').style.display = 'none';
        });
});

// Set minimum date to today
document.getElementById('outingDate').min = new Date().toISOString().split('T')[0];
</script>

{% endblock %}
